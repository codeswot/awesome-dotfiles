# ==============================================================================
# HYPRLAND MAIN CONFIGURATION
# Modularized following Omarchy's style for better maintainability
# ==============================================================================

# 1. Variables and Programs
source = ~/.config/hypr/configs/programs.conf

# 2. Hardware and Displays
source = ~/.config/hypr/configs/monitors.conf
source = ~/.config/hypr/configs/input.conf

# 3. Environment and Autostart
source = ~/.config/hypr/configs/environment.conf
source = ~/.config/hypr/configs/autostart.conf

# 4. Look and Feel
source = ~/.config/hypr/configs/appearance.conf

# 5. Omarchy Theme integration
# This will override border colors setup in appearance.conf
source = ~/.config/omarchy/themes/aether/hyprland.conf

# 6. System Rules and Keybindings
source = ~/.config/hypr/configs/window_rules.conf
source = ~/.config/hypr/configs/keybinds.conf
