# ==============================================================================
# HYPRLOCK CONFIGURATION
# Modularized following Omarchy's style for better maintainability
# ==============================================================================

# 1. Omarchy Theme variables
source = ~/.config/omarchy/themes/aether/hyprlock.conf

# 2. BACKGROUND
background {
    monitor =
    path = /home/codeswot/.config/omarchy/current/background
    blur_passes = 3
    blur_size = 12
    noise = 0.5
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.8
}

# 3. GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    pam_module = hyprlock
}

# 4. TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = $font_color
    font_size = 300
    font_family = SF Pro Display Bold
    position = -20, 130
    halign = center
    valign = center
}

# 5. DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $font_color
    font_size = 24
    font_family = SF Pro Display Bold
    position = -20, -115
    halign = center
    valign = center
}

# 6. INPUT FIELD
input-field {
    monitor =
    size = 400, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    
    # Using Omarchy colors
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    check_color = $check_color
    
    fade_on_empty = false
    rounding = 15
    font_family = SF Pro Display Bold
    
    placeholder_text = <i><span foreground="##ffffff99">Enter Password</span></i>
    
    hide_input = false
    position = -20, -200
    halign = center
    valign = center
}
